name: PR Checks

on:
  pull_request:
    branches:
    - main

jobs:

  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: "true"
          cache-dependency-glob: "pyproject.toml"
      - name: Install & run ruff linter and formatter
        run: |
          uvx ruff version
          uvx ruff format src tests --diff
          uvx ruff check src tests --output-format=github
          uvx ruff clean

  rumdl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: "true"
          cache-dependency-glob: "pyproject.toml"
      - name: Run rumdl linter and formatter
        run: uvx rumdl check --output-format=github .

  slotscheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: "true"
          cache-dependency-glob: "pyproject.toml"
      - name: Install & run slotscheck
        run: uvx --with ".[all]" slotscheck -m iso_week_date

  test:
    env:
      PYTHONHASHSEED: 42
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15"]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: "true"
          cache-suffix: ${{ matrix.python-version }}
          cache-dependency-glob: "pyproject.toml"
      - name: Install dependencies and run tests for python prior to 3.15
        if: ${{ matrix.python-version != "3.15" }}
        run: uv run --all-extras --group tests pytest src tests --cov=src --cov=tests --cov-fail-under=95 --doctest-modules
      - name: Install dependencies and run tests for python 3.15  # dependencies are not yet installable for python 3.15
        if: ${{ matrix.python-version == "3.15" }}
        run: uv run --group tests pytest src tests --cov=src --cov=tests --cov-fail-under=75 --doctest-modules

  test-free-threaded:
    strategy:
      matrix:
        python-version: ["3.13t", "3.14t", "3.15t"]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install base and run tests (no extra deps)
        # It does not run pandas, polars and pydantic tests since deps are not installed!
        run: uv run --group tests pytest --parallel-threads=4 --iterations=10 --cov=src --cov=tests --cov-fail-under=75

  doc-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: "true"
          cache-dependency-glob: "pyproject.toml"
      - name: Install dependencies and check docs can build
        run: uv run --group docs zensical build --clean
